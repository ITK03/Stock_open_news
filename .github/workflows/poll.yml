name: poll-tdnet

# 適時開示を取得→分析→docs/data を更新してコミット。GitHub Pages がそれを配信。
#
# 重要: GitHub の高頻度 cron(*/5 等)は負荷時に大量に間引かれ、実質停止することがある。
# そこで「1回起動したら一定時間ループして数分おきに取得し続ける常駐ジョブ」方式にする。
# cron は1時間ごとに起動するだけ(間引かれても次の起動・長めのループで穴埋め)。
# public リポジトリは Actions 無制限無料なので常時稼働でもコスト0。

on:
  workflow_dispatch: {}
  schedule:
    # 1時間ごとに起動(JST 08:00-19:59 の平日)。各ジョブは約110分ループするので
    # ある時間の起動が間引かれても次がカバーし、cancel-in-progress で常に最新が走る。
    - cron: "0 23 * * 0-4"    # JST 08:00 (月-金)
    - cron: "0 0-10 * * 1-5"  # JST 09:00-19:59 (月-金)

permissions:
  contents: write

concurrency:
  group: poll-tdnet
  cancel-in-progress: true   # 新しい起動が走ったら古いループは止めて最新に置き換える

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Poll loop (約110分・約2.5分間隔)
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LLM_MIN_SCORE: ${{ vars.LLM_MIN_SCORE }}
          MIN_SCORE: ${{ vars.MIN_SCORE }}
          MAX_ITEMS: ${{ vars.MAX_ITEMS }}
          EARNINGS_ENABLED: ${{ vars.EARNINGS_ENABLED }}
          EARNINGS_PER_RUN: ${{ vars.EARNINGS_PER_RUN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          end=$(( $(date +%s) + 110*60 ))
          while [ "$(date +%s)" -lt "$end" ]; do
            # ラッシュ時の取りこぼし防止のため limit を大きめに
            python -m src.main --limit 300 || echo "main failed (continue)"
            if ! git diff --quiet -- docs/data; then
              git add docs/data
              git commit -m "data: update disclosures [skip ci]" || true
              for i in 1 2 3 4; do
                git pull --rebase origin "$BRANCH" \
                  && git push origin "HEAD:$BRANCH" && break
                echo "push retry $i"; sleep $((2 ** i))
              done
            else
              echo "変更なし"
            fi
            sleep 150
          done
